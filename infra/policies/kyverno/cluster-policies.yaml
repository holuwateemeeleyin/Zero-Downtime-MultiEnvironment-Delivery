---
# Kyverno ClusterPolicy: Require standard labels on all pods
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      All pods must have app, version, and app.kubernetes.io/part-of labels.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-pod-labels
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - staging
      validate:
        message: "Pod must have labels: app, version, app.kubernetes.io/part-of"
        pattern:
          metadata:
            labels:
              app: "?*"
              version: "?*"
---
# Kyverno ClusterPolicy: Disallow latest image tag
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      Using a mutable image tag such as latest prevents pinning to a specific version.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - staging
      validate:
        message: "Image tag 'latest' is not allowed. Use a specific version tag."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{element.image}}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{element.image}}"
                    operator: NotContains
                    value: ":"
---
# Kyverno ClusterPolicy: Require resource limits
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      All containers must have CPU and memory limits defined.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-container-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - staging
      validate:
        message: "Containers must have CPU and memory limits defined."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
---
# Kyverno ClusterPolicy: Require non-root containers
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  annotations:
    policies.kyverno.io/title: Require Non-Root Containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/description: >-
      Containers must not run as root. runAsNonRoot must be true.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - staging
      validate:
        message: "Containers must run as non-root (securityContext.runAsNonRoot: true)."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
---
# Kyverno ClusterPolicy: Disallow privileged containers
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/description: >-
      Privileged containers are disabled in prod and staging.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - staging
      validate:
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false"
