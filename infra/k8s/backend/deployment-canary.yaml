---
# Backend canary (v2) Deployment — 1 replica = ~20% traffic when stable has 4
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-canary
  namespace: prod
  labels:
    app: backend
    track: canary
    version: v2
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: shopmicro
    env: prod
  annotations:
    deployment.kubernetes.io/revision: "1"
    shopmicro.io/canary: "true"
    shopmicro.io/canary-weight: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        track: canary
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/shopmicro/backend:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_VERSION
              value: "v2"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
# Canary Service — receives nginx canary-routed traffic
apiVersion: v1
kind: Service
metadata:
  name: backend-canary
  namespace: prod
  labels:
    app: backend
    track: canary
spec:
  selector:
    app: backend
    track: canary
  ports:
    - port: 8080
      targetPort: 8080
      name: http
