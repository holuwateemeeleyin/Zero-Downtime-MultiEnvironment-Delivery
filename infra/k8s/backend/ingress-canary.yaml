---
# Stable backend ingress (primary)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-stable
  namespace: prod
  labels:
    app: backend
    track: stable
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    - host: shopmicro.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-stable
                port:
                  number: 8080
---
# Canary ingress — nginx routes 20% of /api traffic to canary
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-canary
  namespace: prod
  labels:
    app: backend
    track: canary
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "20"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    - host: shopmicro.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-canary
                port:
                  number: 8080
---
# Frontend ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: shopmicro.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
